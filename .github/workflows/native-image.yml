name: native-image

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  native:
    name: GraalVM ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '21', '25' ]
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ matrix.java }}
          distribution: graalvm
          native-image-job-reports: true
      - uses: gradle/actions/setup-gradle@v4
      - name: Native smoke
        run: ./gradlew validateDesignControlPack nativeSmoke --console=plain
